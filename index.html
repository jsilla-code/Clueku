            const d = new Date();

        function getDailyLevelIndex() {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    // splitmix32 para distribuir bien la semilla
    let a = seed | 0;
    a = a + 0x9e3779b9 | 0;
    let t = a ^ a >>> 16;
    t = Math.imul(t, 0x21f0aaad);
    t = t ^ t >>> 15;
    t = Math.imul(t, 0x735a2d97);
    t = (t ^ t >>> 15) >>> 0;
    const idx = t % DAILY_LEVEL_IDS.length;
    return LEVELS.findIndex(l => l.id === DAILY_LEVEL_IDS[idx]);

        function getTimeToMidnight() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const diff = midnight - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

const MAX_LIVES = 5;
const LIVES_REGEN_MS = 2 * 60 * 60 * 1000; // 2 horas en ms

function loadLives() {
    try {
        const saved = localStorage.getItem('clueku_lives');
        if (!saved) return { count: MAX_LIVES, lastRegen: Date.now(), sharedToday: false, sharedDate: null };
        return JSON.parse(saved);
    } catch { return { count: MAX_LIVES, lastRegen: Date.now(), sharedToday: false, sharedDate: null }; }
}

function saveLives(data) {
    localStorage.setItem('clueku_lives', JSON.stringify(data));
}

function computeRegenLives(data) {
    // Calcula cuántas vidas se han regenerado desde lastRegen
    if (data.count >= MAX_LIVES) return data;
    const now = Date.now();
    const elapsed = now - data.lastRegen;
    const regenCount = Math.floor(elapsed / LIVES_REGEN_MS);
    if (regenCount <= 0) return data;
    const newCount = Math.min(MAX_LIVES, data.count + regenCount);
    const newLastRegen = data.lastRegen + regenCount * LIVES_REGEN_MS;
    return { ...data, count: newCount, lastRegen: newLastRegen };
}

function getTimeToNextLife(data) {
    if (data.count >= MAX_LIVES) return null;
    const elapsed = Date.now() - data.lastRegen;
    const remaining = LIVES_REGEN_MS - (elapsed % LIVES_REGEN_MS);
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

                case 'NOT_NEAR_OBJ': return !levelDef.objects.some(o => o.type.id === clue.objId && (isPointAdjObj(p1.r, p1.c, o) || isPointInObj(p1.r, p1.c, o)));
                case 'SAME_ROW_OBJ': return levelDef.objects.some(o => o.type.id === clue.objId && (p1.r >= o.r && p1.r < o.r + o.h));
                case 'SAME_COL_OBJ': return levelDef.objects.some(o => o.type.id === clue.objId && (p1.c >= o.c && p1.c < o.c + o.w));
                default: return false;
            }
        }

        // --- APP PRINCIPAL ---
        function App() {

            // Contador regresivo al próximo puzzle diario
            useEffect(() => {

            // Regeneración automática de vidas cada segundo
useEffect(() => {
    const interval = setInterval(() => {

    }, 1000);

}, []);

        // Timer de resolución: arranca al empezar, para al ganar
useEffect(() => {

}, [gameState, boardConfig]);

            // Cargar stats diarias al inicio

            useEffect(() => {

                const initFirebase = () => {

            const alreadyPlayedToday = dailyStats.lastPlayedDate === getTodayString();

            // --- NUEVO: Lanzar el puzzle diario ---
            const handleDailyPlay = useCallback(() => {

            // --- NUEVO: Compartir resultado ---
            const shareDailyResult = useCallback(() => {

                const text = `${streakEmoji} Clueku — Caso del Día\n📅 ${today}: ${levelName}\n🏆 Racha: ${dailyStats.streak} día${dailyStats.streak !== 1 ? 's' : ''}\n\n¿Puedes resolver el caso?\nhttps://clueku.netlify.app`;

            const isLevelUnlocked = (levelId) => {

                if (idx === 0) return true;

            };

            const handleGoogleLogin = async () => {
                setAuthError("");
                if (!firebaseReady) { setAuthError("Conectando... intenta de nuevo en un segundo."); return; }

            const handleGuestLogin = async () => {

                }
                setUser({ uid: 'local_user', isAnonymous: true });

            };

            const handleLogout = () => { setUser(null); setGameState('login'); };

            // generatePuzzle ahora acepta opciones para el modo diario
            const generatePuzzle = useCallback((levelIndex, options = {}) => {
                const { isDaily = false, dailySeed = null } = options;
                setGameState('playing');
                setBoardConfig(null);
                setFeedbackMsg("Recabando pistas de la escena...");

                const levelDef = LEVELS[levelIndex];
                const size = levelDef.size;
                const activeSuspects = getActiveSuspects(size);

                setTimeout(() => {
                    let puzzleFound = false; let config = null;

                    for (let seedOffset = 0; seedOffset < 150; seedOffset++) {
                        // Si es modo diario, usamos la semilla de fecha; si no, la semilla normal
                        const baseSeed = dailySeed ? dailySeed + seedOffset : levelDef.id * 444444 + seedOffset;
                        const random = splitmix32(baseSeed);
                        const ALL_STATES = generateValidStates(levelDef, activeSuspects, random);
                        if (ALL_STATES.length === 0) continue;

                        let attempts = 0;
                        while (!puzzleFound && attempts < 400) {
                            attempts++;
                            const solution = ALL_STATES[Math.floor(random() * ALL_STATES.length)];
                            const vPos = solution[VICTIM.id];
                            const vRoomId = levelDef.map[vPos.r * size + vPos.c];

                            let suspectsInVictimRoom = [];
                            activeSuspects.forEach(s => {
                                const pos = solution[s.id];
                                if (levelDef.map[pos.r * size + pos.c] === vRoomId) suspectsInVictimRoom.push(s.id);
                            });
                            if (suspectsInVictimRoom.length !== 2) continue;

                            const victimClue = { type: 'VICTIM_CLUE', s: VICTIM.id, text: `En mi sala solo estamos el asesino y yo.` };
                            let pool = [];
                            activeSuspects.forEach(s => {
                                if (s.id === VICTIM.id) return;
                                const sId = s.id; const pos = solution[sId];
                                const z = levelDef.map[pos.r * size + pos.c];
                                const roomName = levelDef.rooms.find(r => r.id === z).name;
                                pool.push({ type: 'ROOM', s: sId, z: z, text: `fue visto rondando por ${roomName}.` });
                                levelDef.rooms.forEach(room => {
                                    if (room.id !== z) pool.push({ type: 'NOT_ROOM', s: sId, z: room.id, text: `no pisó ${room.name} en ningún momento.` });
                                });
                                const onObject = levelDef.objects.find(o => isPointInObj(pos.r, pos.c, o));
                                if (onObject) {
                                    pool.push({ type: 'ON_OBJ', s: sId, objId: onObject.type.id, text: `se encontraba encima de ${onObject.type.name}.`});
                                } else {
                                    const adjObject = levelDef.objects.find(o => isPointAdjObj(pos.r, pos.c, o));
                                    if (adjObject) {
                                        pool.push({ type: 'NEAR_OBJ', s: sId, objId: adjObject.type.id, text: `estaba husmeando justo al lado de ${adjObject.type.name}.`});
                                    } else if (levelDef.objects.length > 0) {
                                        const randomObj = levelDef.objects[Math.floor(random() * levelDef.objects.length)];
                                        pool.push({ type: 'NOT_NEAR_OBJ', s: sId, objId: randomObj.type.id, text: `se mantuvo alejado de ${randomObj.type.name}.`});
                                    }
                                }
                                levelDef.objects.forEach(obj => {
                                    if (pos.r >= obj.r && pos.r < obj.r + obj.h && !isPointInObj(pos.r, pos.c, obj)) {
                                        pool.push({ type: 'SAME_ROW_OBJ', s: sId, objId: obj.type.id, text: `cruzó la misma fila que ${obj.type.name}.` });
                                    }
                                    if (pos.c >= obj.c && pos.c < obj.c + obj.w && !isPointInObj(pos.r, pos.c, obj)) {
                                        pool.push({ type: 'SAME_COL_OBJ', s: sId, objId: obj.type.id, text: `caminó por la misma columna que ${obj.type.name}.` });
                                    }
                                });
                                activeSuspects.forEach(s2 => {
                                    if (sId === s2.id) return;
                                    const z2 = levelDef.map[solution[s2.id].r * size + solution[s2.id].c];
                                    if (z === z2) pool.push({ type: 'SAME_ROOM', s1: sId, s2: s2.id, text: `estaba escondido en la misma sala que ${s2.id}.` });
                                    else pool.push({ type: 'DIFF_ROOM', s1: sId, s2: s2.id, text: `y ${s2.id} estaban en habitaciones diferentes.` });
                                    if (pos.r < solution[s2.id].r) pool.push({ type: 'NORTH', s1: sId, s2: s2.id, text: `estaba más al norte que ${s2.id}.` });
                                    if (pos.r > solution[s2.id].r) pool.push({ type: 'SOUTH', s1: sId, s2: s2.id, text: `estaba más al sur que ${s2.id}.` });
                                    if (pos.c > solution[s2.id].c) pool.push({ type: 'EAST', s1: sId, s2: s2.id, text: `estaba más al este que ${s2.id}.` });
                                    if (pos.c < solution[s2.id].c) pool.push({ type: 'WEST', s1: sId, s2: s2.id, text: `estaba más al oeste que ${s2.id}.` });
                                });
                            });

                            const cluePriority = {
                                'ON_OBJ': 1, 'NEAR_OBJ': 1, 'SAME_ROW_OBJ': 2, 'SAME_COL_OBJ': 2,
                                'SAME_ROOM': 3, 'DIFF_ROOM': 3, 'ROOM': 4, 'NOT_NEAR_OBJ': 4,
                                'NOT_ROOM': 5, 'NORTH': 6, 'SOUTH': 6, 'EAST': 6, 'WEST': 6
                            };
                            pool = pool.sort((a, b) => (cluePriority[a.type] + random() * 1.5) - (cluePriority[b.type] + random() * 1.5));

                            let selectedClues = [victimClue];
                            let currentValidStates = ALL_STATES.filter(state => evalClue(state, victimClue, levelDef));

                            for (let s of activeSuspects) {
                                if (s.id === VICTIM.id) continue;
                                const sClue = pool.find(c => (c.s1 || c.s) === s.id);
                                if (sClue && !selectedClues.includes(sClue)) {
                                    selectedClues.push(sClue);
                                    const nextStates = currentValidStates.filter(state => evalClue(state, sClue, levelDef));
                                    if (nextStates.length > 0) currentValidStates = nextStates;
                                }
                            }

                            if (currentValidStates.length > 1) {
                                for (let clue of pool) {
                                    if (selectedClues.includes(clue)) continue;
                                    const nextStates = currentValidStates.filter(state => evalClue(state, clue, levelDef));
                                    if (nextStates.length > 0 && nextStates.length < currentValidStates.length) {
                                        selectedClues.push(clue);
                                        currentValidStates = nextStates;
                                    }
                                    if (currentValidStates.length === 1) break;
                                }
                            }
                            if (currentValidStates.length !== 1) continue;

                            for (let i = selectedClues.length - 1; i >= 0; i--) {
                                const clueToRemove = selectedClues[i];
                                if (clueToRemove.type === 'VICTIM_CLUE') continue;
                                const mainSuspectId = clueToRemove.s1 || clueToRemove.s;
                                const cluesOfThisSuspect = selectedClues.filter(c => (c.s1 || c.s) === mainSuspectId);
                                if (cluesOfThisSuspect.length > 1) {
                                    const testClues = selectedClues.filter((_, idx) => idx !== i);
                                    let validCount = 0;
                                    for (let state of ALL_STATES) {
                                        if (testClues.every(c => evalClue(state, c, levelDef))) { validCount++; if (validCount > 1) break; }
                                    }
                                    if (validCount === 1) selectedClues.splice(i, 1);
                                }
                            }

                            config = { levelDef, solution, clues: selectedClues, activeSuspects };
                            puzzleFound = true;
                        }
                        if (puzzleFound) break;
                    }

                    if (!puzzleFound) { setFeedbackMsg("Misterio irresoluble. Reintenta."); return; }

                    const groupedClues = {};
                    config.activeSuspects.forEach(s => groupedClues[s.id] = []);
                    config.clues.forEach(clue => { groupedClues[clue.s1 || clue.s].push(clue); });

                    setBoardConfig({ ...config, groupedClues });

                    if (!isDaily && progress.includes(levelDef.id)) {
                        setPlacedSuspects(config.solution);
                        setSelectedSuspect(null); setOriginCell(null);
                        setGameState('won'); setFeedbackMsg("");
                    } else {
                        setPlacedSuspects({});
                        setSelectedSuspect(null); setOriginCell(null);
                        setGameState('playing'); setFeedbackMsg("");
                    }
                }, 100);
            }, [progress]);

            const handleLevelSelect = (idx) => {
    const currentLives = computeRegenLives(lives);
    if (currentLives.count <= 0) {
        saveLives(currentLives);
        setLives(currentLives);
        setShowNoLives(true);
        return;
    }
    setIsDailyMode(false);
    setCurrentLevelIdx(idx);
    generatePuzzle(idx);
};

            const handleCellClick = (r, c) => {
                if (gameState !== 'playing') return;
                setFeedbackMsg("");
                const isObstacleHere = boardConfig.levelDef.objects.some(o => !o.type.walkable && isPointInObj(r, c, o));
                if (isObstacleHere) { setFeedbackMsg("Ese objeto es un obstáculo macizo."); return; }
                const suspectInCellId = Object.keys(placedSuspects).find(id => placedSuspects[id].r === r && placedSuspects[id].c === c);
                if (!suspectInCellId && selectedSuspect) {
                    let isBlocked = false;
                    Object.entries(placedSuspects).forEach(([id, pos]) => {
                        if (id !== selectedSuspect && (pos.r === r || pos.c === c)) isBlocked = true;
                    });
                    if (isBlocked) { setFeedbackMsg("Fila o columna ocupada."); return; }
                    setPlacedSuspects({ ...placedSuspects, [selectedSuspect]: { r, c } });
                    setSelectedSuspect(null); setOriginCell(null);
                } else if (suspectInCellId) {
                    if (selectedSuspect === suspectInCellId) {
                        const newPlaced = { ...placedSuspects }; delete newPlaced[suspectInCellId];
                        setPlacedSuspects(newPlaced); setSelectedSuspect(null); setOriginCell(null);
                    } else {
                        setSelectedSuspect(suspectInCellId); setOriginCell({r, c});
                    }
                }
            };

            const handleBanquilloClick = (sId) => {
                if (selectedSuspect === sId) setSelectedSuspect(null);
                else {
                    setSelectedSuspect(sId);
                    if (placedSuspects[sId]) {
                        const newPlaced = { ...placedSuspects }; delete newPlaced[sId]; setPlacedSuspects(newPlaced);
                    }
                }
                setOriginCell(null);
            };

            const checkSolution = () => {
                const activeSuspectsCount = boardConfig.activeSuspects.length;
                if (Object.keys(placedSuspects).length < activeSuspectsCount) { setFeedbackMsg("¡Faltan personajes por ubicar!"); return; }
                let cluesMet = true;
                for (let clue of boardConfig.clues) {
                    if (!evalClue(placedSuspects, clue, boardConfig.levelDef)) { cluesMet = false; break; }
                }
                if (!cluesMet) {
    // Solo consume vida en modo archivo (no en modo diario)
    if (!isDailyMode) {
        const updatedLives = computeRegenLives(lives);
        const newLives = { ...updatedLives, count: Math.max(0, updatedLives.count - 1) };
        saveLives(newLives);
        setLives(newLives);
        if (newLives.count === 0) {
            setFeedbackMsg("❌ Sin vidas. Recarga para continuar.");
    setShowNoLives(true);
            return;
        }
        setFeedbackMsg(`❌ Alguna deducción no cuadra. ❤️ ${newLives.count} vida${newLives.count !== 1 ? 's' : ''} restante${newLives.count !== 1 ? 's' : ''}.`);
    } else {
        setFeedbackMsg("❌ Alguna deducción de la libreta no cuadra.");
    }
    return;
}

                // --- NUEVO: Actualizar racha si es modo diario ---
                if (isDailyMode) {
                    const today = getTodayString();
                    const currentStats = loadDailyStats();
                    if (currentStats.lastPlayedDate !== today) {
                        const yesterday = new Date();
                        yesterday.setDate(yesterday.getDate() - 1);
                        const yesterdayStr = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
                        const newStreak = currentStats.lastPlayedDate === yesterdayStr ? currentStats.streak + 1 : 1;
                        const newStats = {
                            streak: newStreak,
                            maxStreak: Math.max(newStreak, currentStats.maxStreak),
                            totalPlayed: currentStats.totalPlayed + 1,
                            lastPlayedDate: today
                        };
                        saveDailyStats(newStats);
                        setDailyStats(newStats);
                    }
                }

                if (!isDailyMode && !progress.includes(boardConfig.levelDef.id)) {
                    const newProgress = [...progress, boardConfig.levelDef.id];
                    setProgress(newProgress);
                    localStorage.setItem('clueku_progress', JSON.stringify(newProgress));
                    if (user && user.uid !== 'local_user' && firebaseReady) {
                        setCloudStatus('syncing');
                        const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                        const db = getFirestore(firebaseApp);
                        setDoc(doc(db, 'users', user.uid), { completedLevels: newProgress }, { merge: true })
                            .then(() => setCloudStatus('synced'))
                            .catch(() => setCloudStatus('error'));
                    }
                }
                setGameState('won');
            };

            const isClueMet = (clue) => {
                if (!placedSuspects[clue.s1 || clue.s]) return false;
                if (clue.s2 && !placedSuspects[clue.s2]) return false;
                return evalClue(placedSuspects, clue, boardConfig.levelDef);
            };

            const getKillerId = () => {
                if (!placedSuspects[VICTIM.id]) return null;
                const vPos = placedSuspects[VICTIM.id];
                const vRoomId = boardConfig.levelDef.map[vPos.r * boardConfig.levelDef.size + vPos.c];
                return Object.keys(placedSuspects).find(id => id !== VICTIM.id && boardConfig.levelDef.map[placedSuspects[id].r * boardConfig.levelDef.size + placedSuspects[id].c] === vRoomId);
            };

            const filteredLevels = LEVELS.filter(lvl => filterDifficulty === 'Todos' || lvl.difficulty === filterDifficulty);

            const formatTime = (secs) => {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return m > 0 ? `${m}m ${String(s).padStart(2,'0')}s` : `${s}s`;
};

const generateShareImage = () => {
    return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = 800;
        canvas.height = 420;
        const ctx = canvas.getContext('2d');

        // Fondo degradado oscuro
        const bgGrad = ctx.createLinearGradient(0, 0, 800, 420);
        bgGrad.addColorStop(0, '#0f172a');
        bgGrad.addColorStop(1, '#1e293b');
        ctx.fillStyle = bgGrad;
        ctx.roundRect(0, 0, 800, 420, 24);
        ctx.fill();

        // Borde dorado
        ctx.strokeStyle = '#e2b04a';
        ctx.lineWidth = 3;
        ctx.roundRect(6, 6, 788, 408, 20);
        ctx.stroke();

        // Franja izquierda dorada
        const leftGrad = ctx.createLinearGradient(0, 0, 0, 420);
        leftGrad.addColorStop(0, '#e2b04a');
        leftGrad.addColorStop(1, '#92400e');
        ctx.fillStyle = leftGrad;
        ctx.fillRect(6, 6, 6, 408);

        // Badge "CASO DEL DÍA"
        ctx.fillStyle = '#e2b04a20';
        ctx.beginPath();
        ctx.roundRect(40, 32, 180, 32, 8);
        ctx.fill();
        ctx.fillStyle = '#e2b04a';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('🔍  CASO DEL DÍA', 55, 53);

        // Nombre del caso
        ctx.fillStyle = '#f8fafc';
        ctx.font = 'bold 52px serif';
        ctx.fillText(boardConfig?.levelDef?.name || 'Misterio', 40, 130);

        // Línea separadora
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(40, 150);
        ctx.lineTo(760, 150);
        ctx.stroke();

        // Columna izquierda: tiempo
        ctx.fillStyle = '#94a3b8';
